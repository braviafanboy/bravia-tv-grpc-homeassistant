syntax = "proto3";

package jp.co.sony.hes.ssh.controldevice.v1;

// Minimal proto for the BRAVIA TV integration. Only the authentication
// handshake uses generated message/stub code; every other RPC
// (GetStatesWithAuth, StartNotifyStates, ExecCommandWithAuth, GetNonce,
// GetResourcesWithAuth) is invoked over raw channel calls with hand-built
// payloads, because the TV's wire formats for those differ from this service's
// nominal schema. Those messages are therefore omitted here.

message ConfirmSigninRequest {
  bytes auth_data = 1;
}

message ConfirmSigninResponse {
  bool success = 1;
}

message ConfirmKeysRequest {
  string session_id = 1;
  bytes key_data = 2;
}

message ConfirmKeysResponse {}

message GetSessionRandomRequest {
  string session_id = 1;
}

message GetSessionRandomResponse {
  bytes session_random = 1;
  bytes auth_token = 2;
  string session_id = 3;
}

// Built and serialized directly for the raw StartNotifyStates stream call.
message StartNotifyStatesRequest {
  string session_id = 1;
}

service ControlDeviceService {
  rpc ConfirmSignin(ConfirmSigninRequest) returns (ConfirmSigninResponse);
  rpc ConfirmKeys(ConfirmKeysRequest) returns (ConfirmKeysResponse);
  rpc GetSessionRandom(GetSessionRandomRequest) returns (GetSessionRandomResponse);
}
