name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          # Keyed on pyproject.toml (distinct from the tests job's key, so the
          # two jobs don't share — and clobber — one cache entry).
          cache-dependency-path: pyproject.toml
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      # pytest-homeassistant-custom-component pulls HA (config-flow/coordinator
      # tests); grpcio/protobuf are the integration's runtime deps.
      - run: pip install pytest-homeassistant-custom-component grpcio protobuf cryptography
      - run: pytest tests/ -q
